<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/frontend/css/CreateAdminProduct.css">
    <link rel="stylesheet" href="/frontend/css/styleIndex.css">
    <script src="/frontend/js/ApiAdmin.js" defer></script>
</head>
<body>
    <main>
        <h1><b>Administrador</b></h1>

        <div class="admin-form-wrapper">
            <div class="admin-form-card">
          
              <div class="admin-form-header">
                <div class="admin-form-header-icon"><b>+</b></div>
                <span><b>Crear producto</b></span>
              </div>
          
              <div class="admin-form-row">
                <div class="admin-form-group">
                  <label>Nombre</label>
                  <input type="text" id="nombre" required placeholder="Ej: Auriculares BT500" />
                </div>
                <div class="admin-form-group">
                  <label>Marca</label>
                  <input type="text" id="marca" required placeholder="Ej: Sony" />
                </div>
              </div>
          
              <div class="admin-form-row">
                <div class="admin-form-group">
                  <label>Precio</label>
                  <div class="admin-price-wrapper">
                    <span class="prefix">$</span>
                    <input type="number" id="precio" required placeholder="1.00" min="1" />
                  </div>
                </div>
                <div class="admin-form-group">
                  <label>Stock</label>
                  <input type="number" id="stock" required placeholder="1" min="1" />
                </div>
                <div class="admin-form-group" style="grid-column: span 2;">
                  <label>Foto</label>
                  <input type="text" id="foto" required placeholder="Ej: https://example.com/foto.jpg"/>
                </div>
              </div>
          
              <div class="admin-form-group admin-form-group--full">
                <label>Descripción</label>
                <textarea id="descripcion" placeholder="Descripción del producto..."></textarea>
              </div>
          
              <div class="admin-form-actions">
                <button id="btn-cancelar">Cancelar</button>
                <button id="btn-crear-producto" type="button" class="btn-primary">Crear producto</button>
              </div>
          
            </div>
          </div>
    </main>
</body>
</html>
