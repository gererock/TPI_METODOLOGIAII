<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyPaint - Registro</title>
    <link rel="stylesheet" href="/frontend/css/styleRegistro.css">
</head>
<body>

<header>
    <div class="logo">BodyPaint</div>
</header>

<main>
    <div class="form-card">

        <div class="form-header">
            <h1>Crear cuenta</h1>
        </div>

        <form class="registro-form">

            <div class="fila-doble">
                <div class="campo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Juan" required>
                </div>
                <div class="campo">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Pérez" required>
                </div>
            </div>
        
            <div class="fila-doble">
                <div class="campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="juan@email.com" required>
                </div>
                <div class="campo">
                    <label for="dni">DNI</label>
                    <input type="text" id="dni" placeholder="25345987" required>
                </div>
            </div>
        
            <div class="campo">
                <label for="password">Contraseña</label>
                <div class="input-pass">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-pass" id="button-password">
                        👁
                    </button>
                </div>
            </div>
        
            <div class="fila-triple">
                <div class="campo">
                    <label for="provincia">Provincia</label>
                    <input type="text" id="provincia" placeholder="Córdoba" required>
                </div>
                
                <div class="campo">
                    <label for="localidad">Localidad</label>
                    <input type="text" id="localidad" placeholder="Localidad" required>
                </div>
            </div>
        
            <div class="campo campo-piso">
                <label for="piso">Piso <span class="opcional">(opcional)</span></label>
                <input type="number" id="piso" min="1" placeholder="Ej: 3">
            </div>
        
            <div class="campo">
                <label for="departamento">Departamento</label>
                <input type="text" id="departamento" placeholder="A" required>
            </div>
        
            <button type="submit" class="btn-registrar">Crear cuenta</button>
        
        </form>

    </div>
</main>

<script src="/frontend/js/RegistrarClienteApi.js"></script>
</body>
</html>
