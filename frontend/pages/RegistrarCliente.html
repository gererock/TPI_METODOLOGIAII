<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyPaint - Registro</title>
    <link rel="stylesheet" href="/frontend/css/styleRegistro.css">
</head>
<body>

    <header>
        <div class="logo">BodyPaint</div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <main>
        <div class="form-card">

            <div class="form-header">
                <h1>Crear cuenta</h1>
                <p>Completá tus datos para registrarte</p>
            </div>

            <form class="registro-form" action="#" method="post">

                <div class="fila-doble">
                    <div class="campo">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Juan" required>
                    </div>
                    <div class="campo">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" placeholder="Pérez" required>
                    </div>
                </div>

                <div class="fila-doble">
                    <div class="campo">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="juan@email.com" required>
                    </div>
                    <div class="campo">
                        <label for="dni">DNI</label>
                        <input type="text" id="dni" name="dni" placeholder="12345678" maxlength="8" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="password">Contraseña</label>
                    <div class="input-pass">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-pass" onclick="togglePass()">
                            <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="fila-triple">
                    <div class="campo">
                        <label for="provincia">Provincia</label>
                        <input type="text" id="provincia" name="provincia" placeholder="Córdoba" required>
                    </div>
                    <div class="campo">
                        <label for="departamento">Departamento</label>
                        <input type="text" id="departamento" name="departamento" placeholder="Río Segundo" required>
                    </div>
                    <div class="campo">
                        <label for="localidad">Localidad</label>
                        <input type="text" id="localidad" name="localidad" placeholder="Localidad" required>
                    </div>
                </div>

                <div class="campo campo-piso">
                    <label for="piso">Piso / Depto <span class="opcional">(opcional)</span></label>
                    <input type="text" id="piso" name="piso" placeholder="Ej: 3° B">
                </div>

                <button type="submit" class="btn-registrar">Crear cuenta</button>

            </form>

            <div class="login-link">
                ¿Ya tenés cuenta? <a href="/frontend/pages/Login.html">Iniciá sesión acá</a>
            </div>
        </div>
    </main>

</body>
</html>
